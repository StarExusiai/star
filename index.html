<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
</head>
<body>
    <form action="#" method="get">
        <h3>用户注册</h3>
        用户名: <input type="text" name="username"><br><br>
        密&nbsp;&nbsp;&nbsp;&nbsp;码: <input type="password" name="password"><br><br>
        确认密码: <input type="password" name="confirm_password"><br><br>
        性别:
        <input type="radio" name="sex" value="m">男
        <input type="radio" name="sex" value="f">女<br><br>
        爱好:
        <input type="checkbox" name="hobby" value="reading">阅读
        <input type="checkbox" name="hobby" value="sports">运动
        <input type="checkbox" name="hobby" value="music">音乐<br><br>
        头像: <input type="file" name="file"/><br><br>
        学历:
        <select name="education">
            <option value="highschool">高中</option>
            <option value="bachelor">本科</option>
            <option value="master">硕士</option>
            <option value="phd">博士</option>
        </select><br><br>
        <button type="submit" value="注册">
            <a href="https://www.yuanshen.com/#/" target="_blank">注册</a>
        </button>
    </form>

</body>
</html>
